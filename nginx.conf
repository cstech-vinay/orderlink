server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    # Security headers (Traefik also sets these; belt and braces)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Home page
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    # Meta files at root
    location = /robots.txt     { try_files $uri =404; access_log off; }
    location = /sitemap.xml    { try_files $uri =404; access_log off; }
    location = /favicon.ico    { try_files $uri =404; access_log off; log_not_found off; }
    location = /manifest.webmanifest { try_files $uri =404; access_log off; }

    # Long-cache static assets (images, fonts, css)
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?|ttf|otf)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Everything else → 301 to home (preserves link equity from expired-domain backlinks)
    location / {
        return 301 https://orderlink.in/;
    }

    # Suppress noisy health-check logs
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }
}
