services:
  web:
    build: .
    image: orderlink-web
    container_name: orderlink-web
    restart: always
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public

      # Apex router (orderlink.in)
      - traefik.http.routers.orderlink.rule=Host(`orderlink.in`)
      - traefik.http.routers.orderlink.entrypoints=websecure
      - traefik.http.routers.orderlink.tls=true
      - traefik.http.routers.orderlink.tls.certresolver=mytlschallenge
      - traefik.http.routers.orderlink.middlewares=orderlink-headers
      - traefik.http.services.orderlink.loadbalancer.server.port=80

      # www → apex 301 redirect
      - traefik.http.routers.orderlink-www.rule=Host(`www.orderlink.in`)
      - traefik.http.routers.orderlink-www.entrypoints=websecure
      - traefik.http.routers.orderlink-www.tls=true
      - traefik.http.routers.orderlink-www.tls.certresolver=mytlschallenge
      - traefik.http.routers.orderlink-www.middlewares=orderlink-www-redirect
      - traefik.http.middlewares.orderlink-www-redirect.redirectregex.regex=^https?://www\.orderlink\.in/(.*)
      - traefik.http.middlewares.orderlink-www-redirect.redirectregex.replacement=https://orderlink.in/$${1}
      - traefik.http.middlewares.orderlink-www-redirect.redirectregex.permanent=true

      # Security headers middleware
      - traefik.http.middlewares.orderlink-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.orderlink-headers.headers.STSSeconds=315360000
      - traefik.http.middlewares.orderlink-headers.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.orderlink-headers.headers.STSPreload=true
      - traefik.http.middlewares.orderlink-headers.headers.forceSTSHeader=true
      - traefik.http.middlewares.orderlink-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.orderlink-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.orderlink-headers.headers.frameDeny=true
      - traefik.http.middlewares.orderlink-headers.headers.referrerPolicy=strict-origin-when-cross-origin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - traefik_public

networks:
  traefik_public:
    external: true
