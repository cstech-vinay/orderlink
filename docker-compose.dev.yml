# Full dev environment — everything runs in containers.
# Start:   docker compose -f docker-compose.dev.yml up -d
# Stop:    docker compose -f docker-compose.dev.yml down
# Logs:    docker compose -f docker-compose.dev.yml logs -f app
# Migrate: docker compose -f docker-compose.dev.yml exec app npx drizzle-kit migrate
# Seed:    docker compose -f docker-compose.dev.yml exec app npx tsx scripts/seed-inventory.ts
#
# Ports:
#  - 3000  → Next.js dev (open http://localhost:3000)
#  - 5432  → Postgres (so host-side drizzle-kit / psql still work via localhost:5432)

services:
  db:
    image: postgres:16-alpine
    container_name: orderlink-pg-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: orderlink_user
      POSTGRES_PASSWORD: devpw
      POSTGRES_DB: orderlink
    ports:
      - "5432:5432"
    volumes:
      - orderlink_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderlink_user -d orderlink"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Separate Postgres ONLY for `npm test`. Tests do DELETE FROM orders_ref etc
  # in beforeEach — if they shared the dev DB, running tests mid-flight would
  # wipe in-progress orders (happened with OL-2026-0003, cost a test payment).
  # tmpfs so this DB starts clean every `docker compose up`.
  db-test:
    image: postgres:16-alpine
    container_name: orderlink-pg-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: orderlink_user
      POSTGRES_PASSWORD: devpw
      POSTGRES_DB: orderlink_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderlink_user -d orderlink_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: orderlink-app:dev
    container_name: orderlink-app-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Override host-side DATABASE_URL: inside the compose network, Postgres
      # is reachable at service name "db", not localhost.
      DATABASE_URL: postgres://orderlink_user:devpw@db:5432/orderlink
    ports:
      - "3000:3000"
    volumes:
      # Bind source so edits hot-reload. Exclude node_modules + .next so they
      # stay in the container (host Windows filesystem is slow for those).
      - .:/app
      - orderlink_node_modules:/app/node_modules
      - orderlink_next_cache:/app/.next
      # Invoice PDFs generated on payment success — visible on the host for
      # inspection. In prod (docker-compose.store.yml) this is the authoritative
      # local cache fallback when Salesforce Files is temporarily unreachable.
      - ./data/invoices:/app/data/invoices

  # Background worker: drains pending_sf_sync rows to Salesforce on a 30s poll.
  # Shares the app image (Dockerfile.dev) so it has tsx + all deps on hand.
  # Reuses orderlink_node_modules volume so we don't run npm ci twice.
  #
  # Auto-exits cleanly (exit 0) when SF_SYNC_ENABLED=false → compose's
  # restart policy does NOT retry on clean exits, so the container just
  # stays stopped until user flips the flag + `docker compose up -d`.
  #
  # Private key is bind-mounted read-only; everything else shares the
  # .env file with the app service.
  sf-sync-worker:
    image: orderlink-app:dev
    container_name: orderlink-sf-sync-worker
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgres://orderlink_user:devpw@db:5432/orderlink
      # Poll every 30s — can override at runtime with SF_WORKER_INTERVAL_MS.
    volumes:
      - .:/app
      - orderlink_node_modules:/app/node_modules
      # Local invoice cache — worker reads the PDF from disk for fresh orders
      # (before SF upload), and writes the sf:… pointer back after upload.
      - ./data/invoices:/app/data/invoices
      # Private key mounted read-only for the JWT exchange.
      - ./certs/sf-jwt.key:/app/certs/sf-jwt.key:ro
    command: ["npx", "tsx", "scripts/run-sf-sync-worker.ts"]

  # Pulls SF's OrderLink_Coupon__c catalog into the PG `coupons` cache every
  # 10 minutes. Keeps /api/coupons/validate on the hot checkout path (<50ms)
  # while letting marketing own coupon CRUD in the SF UI.
  coupon-cache-refresher:
    image: orderlink-app:dev
    container_name: orderlink-coupon-cache
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgres://orderlink_user:devpw@db:5432/orderlink
      LOOP: "1"
      COUPON_CACHE_INTERVAL_MS: "600000"
    volumes:
      - .:/app
      - orderlink_node_modules:/app/node_modules
      - ./certs/sf-jwt.key:/app/certs/sf-jwt.key:ro
    command: ["npx", "tsx", "scripts/refresh-coupon-cache.ts"]

volumes:
  orderlink_pg_data:
  orderlink_node_modules:
  orderlink_next_cache:
